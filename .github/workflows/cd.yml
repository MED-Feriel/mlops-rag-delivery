name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Run CI gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      matrix:
        service: [api, simulator]
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Lowercase repository
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract release version from commit message
        id: version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" =~ release[[:space:]]+v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "tag=v${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "Release tag detected: v${BASH_REMATCH[1]}"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.service }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Tag release version (if applicable)
        if: steps.version.outputs.tag != ''
        run: |
          IMG="ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}"
          docker buildx imagetools create \
            --tag "${IMG}:${{ steps.version.outputs.tag }}" \
            "${IMG}:${{ github.sha }}"
          echo "Tagged ${IMG}:${{ steps.version.outputs.tag }}"
