name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.0.0 black==24.2.0

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length=120 --extend-ignore=E203,W503 --per-file-ignores='tests/*:E402'

      - name: Run black --check
        run: black --check src/ tests/

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: src:.
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Coverage threshold check (>= 70%)
        run: |
          pip install coverage
          coverage report --fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    env:
      QDRANT_HOST: ${{ secrets.QDRANT_HOST || 'localhost' }}
      QDRANT_PORT: ${{ secrets.QDRANT_PORT || '6333' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
      PYTHONPATH: src:.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run integration tests
        run: pytest tests/integration/ -v
