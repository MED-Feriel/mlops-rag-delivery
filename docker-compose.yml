networks:
  rag-network:
    driver: bridge

volumes:
  pgdata:
  qdrant_data:
  esdata:
  mlflow_data:
  airflow_logs:
  open_webui_data:

services:

  postgres:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    networks: [rag-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports: ["2181:2181"]
    networks: [rag-network]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [rag-network]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes: [qdrant_data:/qdrant/storage]
    networks: [rag-network]

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes: [esdata:/usr/share/elasticsearch/data]
    networks: [rag-network]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  logstash:
    image: logstash:8.12.0
    depends_on: [elasticsearch]
    ports: ["5044:5044"]
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    networks: [rag-network]

  kibana:
    image: kibana:8.12.0
    depends_on: [elasticsearch]
    ports: ["5601:5601"]
    networks: [rag-network]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports: ["5000:5000"]
    volumes: [mlflow_data:/mlflow]
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    networks: [rag-network]

  airflow:
    image: apache/airflow:2.9.0
    depends_on: [postgres, kafka]
    command: standalone
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:secret@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_DB: livraison
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      OLLAMA_HOST: host.docker.internal
      MLFLOW_TRACKING_URI: http://mlflow:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHONPATH: /opt/airflow:/opt/airflow/src
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: "--extra-index-url https://download.pytorch.org/whl/cpu torch==2.2.0+cpu asyncpg==0.29.0 confluent-kafka==2.3.0 structlog==24.1.0 mlflow==2.10.0 sentence-transformers==2.5.1 qdrant-client==1.7.3 pydantic-settings==2.2.1"
    ports: ["8081:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - airflow_logs:/opt/airflow/logs
    networks: [rag-network]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [rag-network]

  grafana:
    image: grafana/grafana:latest
    depends_on: [prometheus]
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks: [rag-network]

  simulator:
    build:
      context: .
      dockerfile: docker/simulator/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    ports: ["8090:8090"]
    volumes:
      - ./simulation_config.yaml:/app/simulation_config.yaml
      - ./src/simulator:/app/simulator
    networks: [rag-network]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on: [api]
    ports: ["3001:8080"]
    environment:
      OPENAI_API_BASE_URL: http://api:8080/v1
      OPENAI_API_KEY: not-required
      WEBUI_AUTH: "false"
      ENABLE_OLLAMA_API: "false"
      DEFAULT_MODELS: "rag-livraison"
      ENABLE_RAG_WEB_SEARCH: "false"
      ENABLE_RAG_HYBRID_SEARCH: "false"
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "false"
      AUDIO_STT_ENGINE: ""
      AUDIO_TTS_ENGINE: ""
      ENABLE_IMAGE_GENERATION: "false"
      OFFLINE_MODE: "true"
    volumes: [open_webui_data:/app/backend/data]
    networks: [rag-network]

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    depends_on:
      qdrant: { condition: service_started }
    env_file: .env
    ports: ["8080:8080"]
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [rag-network]
