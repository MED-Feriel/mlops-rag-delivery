# Logstash v3 — pipeline livraison Hello Delivery
#
# 3 inputs : Kafka (6 topics simulator), Beats (5044), TCP/JSON (5045)
# Routing  : 1 index par topic Kafka / par service applicatif
#
#   Kafka topic       → index Elasticsearch
#   ─────────────────────────────────────────────────────────────
#   commandes         → livraison-commandes-YYYY.MM.dd
#   restaurants       → livraison-restaurants-YYYY.MM.dd
#   livraisons        → livraison-livraisons-YYYY.MM.dd
#   paiements         → livraison-paiements-YYYY.MM.dd
#   incidents         → livraison-incidents-YYYY.MM.dd
#   avis_clients      → livraison-avis_clients-YYYY.MM.dd
#
# Le header Kafka `source_service` est conservé dans le payload (client-service,
# restaurant-service, livreur-service, payment-service, tracking-service,
# anomaly-injector) pour exploitation dans Grafana/Kibana.

input {
  # ── Topics simulator v3 (publiés par realtime_producer.py) ──
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["commandes", "restaurants", "livraisons", "paiements", "incidents", "avis_clients"]
    group_id => "logstash-livraison-v3"
    auto_offset_reset => "latest"
    decorate_events => "basic"
    codec => json
    consumer_threads => 2
    type => "kafka"
  }

  # ── Inputs hérités (logs applicatifs via Beats/Filebeat ou TCP) ──
  beats {
    port => 5044
    type => "beats"
  }
  tcp {
    port => 5045
    codec => json
    type => "tcp"
  }
}

filter {
  if [type] == "kafka" {
    # decorate_events => basic ajoute @metadata.kafka.topic, partition, offset
    mutate {
      add_field => {
        "[@metadata][kafka_topic]" => "%{[@metadata][kafka][topic]}"
        "[@metadata][index]" => "livraison-%{[@metadata][kafka][topic]}-%{+YYYY.MM.dd}"
      }
    }
    # Promouvoir source_service en top-level tag pour faciliter le filtrage Kibana/Grafana
    if [source_service] {
      mutate { add_tag => ["service:%{source_service}"] }
    }
    # Convertir le champ timestamp ISO 8601 du payload en @timestamp Elasticsearch
    if [timestamp] {
      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }
    }
  } else if [service] {
    mutate { add_field => { "[@metadata][index]" => "livraison-%{service}-%{+YYYY.MM.dd}" } }
  } else {
    mutate { add_field => { "[@metadata][index]" => "livraison-default-%{+YYYY.MM.dd}" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index]}"
  }

  # Décommenter pour debug : trace stdout pendant le développement
  # stdout { codec => rubydebug { metadata => true } }
}
