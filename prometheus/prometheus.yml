global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'rag-api'
    static_configs: [{ targets: ['api:8080'] }]
  - job_name: 'simulator'
    static_configs: [{ targets: ['simulator:8090'] }]
  - job_name: 'qdrant'
    static_configs: [{ targets: ['qdrant:6333'] }]

rule_files:
  - "alerts.yml"
